<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PickleMate 改版标注原型</title><style>
:root{--g:#7ed800;--g2:#62b800;--bg:#f2f2f0;--p:#f7f7f5;--r:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:#111}button{font-family:inherit;border:0;background:none;cursor:pointer}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.outer{width:410px;height:820px;max-width:100%;background:#000;border-radius:42px;padding:8px;box-shadow:0 24px 60px #0004}.phone{height:100%;background:var(--p);border-radius:34px;overflow:hidden;display:flex;flex-direction:column;position:relative}.status{height:40px;padding:12px 24px 0;display:flex;justify-content:space-between;font-size:12px;font-weight:900;position:relative;flex-shrink:0}.notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:112px;height:28px;background:#000;border-radius:999px}.screen{flex:1;min-height:0;display:flex;flex-direction:column}.hd{padding:0 20px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}.hleft{display:flex;align-items:center;gap:12px;min-width:0}.ttl{font-size:25px;line-height:1.08;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:12px;color:#71717a;margin-top:4px}.icons{display:flex;gap:8px}.ic,.back{width:44px;height:44px;border-radius:999px;background:#fff;box-shadow:0 2px 10px #0001;display:flex;align-items:center;justify-content:center;font-size:18px}.back{font-size:30px}.content{flex:1;overflow:auto;padding:0 20px 16px;display:flex;flex-direction:column;gap:14px}.card{background:#fff;border:1px solid #00000008;border-radius:26px;box-shadow:0 2px 12px #0000000b;padding:16px;position:relative}.hero{background:linear-gradient(135deg,#d9ff90,var(--g));border-radius:30px;padding:50px 20px 20px;box-shadow:0 2px 12px #0001;position:relative}.hero h2{font-size:30px;line-height:1.1;margin:8px 0 0;font-weight:950}.hero p{font-size:12px;color:#3f4d2a}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}.btnw,.btnd{border-radius:16px;padding:12px 4px;font-size:14px;font-weight:950}.btnw{background:#fff}.btnd{background:#111;color:#fff}.ann{position:absolute;z-index:20;display:flex;gap:6px;align-items:flex-start}.ann .n{width:20px;height:20px;background:var(--r);color:#fff;border-radius:50%;font-size:11px;font-weight:950;display:flex;align-items:center;justify-content:center;outline:2px solid #fff}.ann .t{background:#fff;border:1px solid #fca5a5;color:#dc2626;border-radius:12px;padding:5px 8px;font-size:10px;line-height:1.25;font-weight:950;max-width:150px;box-shadow:0 2px 8px #0001}.nav{height:74px;background:#fff;border-top:1px solid #0001;display:grid;grid-template-columns:repeat(5,1fr);flex-shrink:0}.nav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;color:#71717a}.nav .a{color:var(--g2);font-weight:950}.nav i{font-style:normal;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}.nav .a i{background:#7ed8002d}.row{display:flex;align-items:center;gap:12px;text-align:left;width:100%;padding:0}.av{border-radius:50%;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:950;outline:4px solid #fff;box-shadow:0 2px 8px #0001;flex-shrink:0}.sm{width:36px;height:36px}.md{width:48px;height:48px}.lg{width:80px;height:80px;font-size:26px}.muted{color:#71717a}.small{font-size:12px}.fw{font-weight:950}.invite,.tag{background:#7ed80026;color:var(--g2);font-size:12px;font-weight:950;padding:6px 10px;border-radius:999px}.game{padding:14px}.game button{width:100%;text-align:left}.gt{display:flex;justify-content:space-between;gap:10px}.gtitle{font-weight:950}.gm{font-size:14px;color:#71717a;margin-top:7px}.badge{background:#ffedd5;color:#f97316;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:950;height:max-content;white-space:nowrap}.gb{display:flex;justify-content:space-between;align-items:center;margin-top:12px}.price{font-size:18px;font-weight:950}.join{background:var(--g);color:#fff;border-radius:999px;padding:9px 22px;font-size:14px;font-weight:950}.pillrow{display:flex;gap:8px;overflow:auto;padding:28px 20px 12px;position:relative}.pill{display:inline-flex;background:#f4f4f5;color:#52525b;border-radius:999px;font-size:12px;font-weight:950;padding:8px 12px;white-space:nowrap}.pill.a{background:var(--g);color:#fff}.map{height:112px;position:relative;overflow:hidden;background:#f1f6ee}.map:before{content:"";position:absolute;inset:0;opacity:.7;background-image:linear-gradient(90deg,#0000000d 1px,transparent 1px),linear-gradient(0deg,#0000000a 1px,transparent 1px);background-size:40px 40px}.dot{position:absolute;left:48%;top:35%;width:56px;height:56px;border-radius:50%;background:#7ed8002d;display:flex;align-items:center;justify-content:center}.dot:after{content:"";width:20px;height:20px;background:#3b82f6;border-radius:50%;outline:4px solid #fff}.pin{position:absolute;width:28px;height:28px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}.p1{left:20%;top:45%}.p2{left:63%;top:40%}.p3{left:78%;top:44%}.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}.stat{background:#fafafa;border-radius:16px;padding:8px 4px}.stat b{display:block}.stat span{font-size:10px;color:#71717a}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;margin-top:16px}.ibox{background:#fafafa;border-radius:16px;padding:12px 6px}.ibox span{font-size:12px;color:#71717a}.ibox b{display:block;font-size:14px;margin-top:6px}.fee,.line{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #f1f1f1;font-size:14px}.fee span:first-child,.line span:first-child{color:#71717a}.fee span:last-child,.line span:last-child{font-weight:950;text-align:right}.total{border-top:1px solid #f1f1f1;margin-top:8px;padding-top:12px;display:flex;justify-content:space-between;font-weight:950}.amber{background:#fffbeb;border-color:#fde68a}.amber h3{color:#78350f;margin:0 0 8px}.amber p{color:#92400e;font-size:14px;line-height:1.6;margin:0}.footer{padding:18px 20px;background:#fff;border-top:1px solid #0001}.primary{width:100%;border-radius:16px;background:var(--g);color:#fff;padding:16px 0;font-size:16px;font-weight:950;box-shadow:0 10px 20px #7ed80040}.profhero{height:192px;background:linear-gradient(135deg,#eff9d9,#fff);position:relative;flex-shrink:0}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:-4px}.actions button{border-radius:16px;padding:12px 0;font-weight:950;background:#fff;box-shadow:0 2px 8px #0001}.actions button:first-child{background:var(--g);color:#fff}.chart{height:112px;display:flex;align-items:flex-end;gap:14px;margin-top:14px}.bw{flex:1;text-align:center;font-size:11px;color:#71717a}.bb{height:80px;background:#f4f4f5;border-radius:999px;display:flex;align-items:flex-end;overflow:hidden}.bar{width:100%;background:var(--g);border-radius:999px}.data{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.spark{height:32px;margin-top:12px;border-radius:999px;background:linear-gradient(90deg,#7ed8001a,#7ed80055,#7ed8001a)}@media(max-width:480px){.wrap{padding:0;background:#000}.outer{width:100vw;height:100vh;border-radius:0;padding:0}.phone{border-radius:0}}
</style></head><body><div class="wrap"><div class="outer"><div class="phone"><div class="status"><span>9:41</span><div class="notch"></div><span>▱ 5G</span></div><div id="app" class="screen"></div></div></div></div><script>
const games=[{id:1,title:'今晚新手友好局',time:'今天 19:30-21:30',venue:'TopSpin 球场 · 2号场',distance:'2.3 km',level:'2.5–3.0级',people:'3/4人',price:'¥25/人',badge:'推荐',tags:['新手友好','可借球拍','自动分组'],fee:['¥20','¥3','¥2','¥25']},{id:2,title:'女生专场 · 轻松娱乐局',time:'今天 20:00-22:00',venue:'Paddle Park · 3号场',distance:'1.7 km',level:'2.5–3.5级',people:'1/4人',price:'¥30/人',badge:'同城',tags:['女生友好','娱乐局','附近'],fee:['¥25','¥5','¥0','¥30']},{id:3,title:'周末竞技练习局',time:'明天 09:00-11:00',venue:'ACE Pickleball · 1号场',distance:'4.1 km',level:'3.5–4.0级',people:'2/4人',price:'¥40/人',badge:'进阶',tags:['双打','进阶','候补开放'],fee:['¥35','¥5','¥0','¥40']}];
const buds=[{id:1,name:'Mia',av:'M',age:'21岁',level:'新手',ball:'球龄8个月',area:'TopSpin / 大学城',time:'今晚可约',tags:['新手友好','愿意带新人','双打'],joined:'18场',hosted:'3次',cancel:'0次',rating:'4.8',intro:'喜欢轻松娱乐局，希望找到稳定球友一起练习。更在意氛围，不喜欢太竞技。'},{id:2,name:'Ken',av:'K',age:'24岁',level:'进阶',ball:'球龄1.6年',area:'ACE Pickleball',time:'周末可约',tags:['竞技练习','双打配合','可带新手'],joined:'32场',hosted:'8次',cancel:'1次',rating:'4.7',intro:'偏进阶双打，平时会约练习局，也愿意带新手入门。希望水平匹配更准确。'},{id:3,name:'Alex',av:'A',age:'26岁',level:'入门',ball:'球龄2.6年',area:'Pickle Club / TopSpin',time:'工作日晚可约',tags:['稳定组局','新手友好','右手持拍'],joined:'28场',hosted:'9次',cancel:'0次',rating:'4.9',intro:'喜欢下班后轻松双打，也会组织新手友好局。希望通过主页让陌生球友更放心。'}];
let S={page:'home',g:games[0],b:buds[0],tab:'games'};const $=s=>document.querySelector(s);function ann(n,t,sty){return `<div class=ann style="${sty}"><span class=n>${n}</span><span class=t>${t}</span></div>`}function av(x,c='md'){return `<div class="av ${c}">${x}</div>`}function hd(t,s='',back=0){return `<div class=hd><div class=hleft>${back?`<button class=back onclick=back()>‹</button>`:''}<div><div class=ttl>${t}</div><div class=sub>${s}</div></div></div><div class=icons><button class=ic>◴</button><button class=ic>🔔</button></div></div>`}function nav(a){return `<div class=nav>${[['home','首页','⌂'],['stats','统计','▥'],['discover','发现','➤'],['messages','消息','◌'],['profile','我的','○']].map(x=>`<button onclick=go('${x[0]}') class="${a==x[0]?'a':''}"><i>${x[2]}</i><span>${x[1]}</span></button>`).join('')}</div>`}function go(p){S.page=p;render()}function back(){S.page=S.page=='detail'?'discover':S.page=='buddy'?'detail':'home';render()}function pill(t,a=0){return `<span class="pill ${a?'a':''}">${t}</span>`}function st(l,v){return `<div class=stat><b>${v}</b><span>${l}</span></div>`}function ib(l,v){return `<div class=ibox><span>${l}</span><b>${v}</b></div>`}function game(g){return `<div class="card game"><button onclick="S.g=games.find(x=>x.id==${g.id});go('detail')"><div class=gt><div><div class=gtitle>${g.title}</div><div class=gm>${g.time}</div><div class=gm>⌖ ${g.venue} · ${g.distance}</div><div class=gm>◎ ${g.level}　♟ ${g.people}</div></div><span class=badge>${g.badge}</span></div><div class=gb><span class=price>${g.price}</span><span class=join>加入</span></div></button></div>`}
function home(){return `${hd('快速找到匹克球搭子','约伴、组局、约场，一次完成')}<div class=content><div class=hero>${ann(1,'首页入口前置：优先突出找球友/加入组局/发布组局','top:12px;left:16px')}<b>本次改版重点</b><h2>先找人，再成局</h2><p>根据用户反馈，首页优先突出约伴与组局入口。</p><div class=grid3><button onclick=go('buddies') class=btnw>找球友</button><button onclick=go('discover') class=btnw>加入组局</button><button onclick=go('post') class=btnd>发布组局</button></div></div><div class=card style="padding-top:50px">${ann(2,'新增找搭子：按距离/水平/时间推荐球友','top:12px;right:12px')}<div style="display:flex;justify-content:space-between;margin-bottom:12px"><b>今晚推荐球友</b><button onclick=go('buddies') class=small style="color:var(--g2);font-weight:950">查看更多 ›</button></div>${buds.slice(0,2).map(b=>`<button class=row onclick="S.b=buds.find(x=>x.id==${b.id});go('buddy')">${av(b.av,'sm')}<div style=flex:1><div class="fw small">${b.name} · ${b.ball}</div><div class="muted small">${b.time} · ${b.area} · 爽约${b.cancel}</div></div><span class=invite>邀请</span></button>`).join('<br>')}</div><div>${game(games[0])}</div><div class=card style="padding-top:50px">${ann(9,'运动数据保留为辅助功能，不抢约伴主流程','top:12px;left:12px')}<div style="display:flex;justify-content:space-between"><b>运动数据</b><span class="muted small">辅助记录</span></div><div class=statgrid style="grid-template-columns:repeat(3,1fr);margin-top:12px">${st('步数','8,942')}${st('卡路里','512')}${st('心率','128')}</div></div></div>${nav('home')}`}
function discover(){return `${hd('发现','找局、找搭子、订场地')}<div class=pillrow>${ann(3,'发现页收敛为：组局 / 搭子 / 场地','top:0;left:20px')}<button onclick="S.tab='games';render()">${pill('附近组局',S.tab=='games')}</button><button onclick="S.tab='buddies';render()">${pill('找搭子',S.tab=='buddies')}</button><button onclick="S.tab='venues';render()">${pill('场地预约',S.tab=='venues')}</button></div><div class=content>${S.tab=='games'?discGames():S.tab=='buddies'?buddyList():venues()}</div>${nav('discover')}`}
function discGames(){return `<div class="card map"><div class=dot></div><div class="pin p1">⌖</div><div class="pin p2">⌖</div><div class="pin p3">⌖</div></div><b>附近组局</b>${games.map(game).join('')}`}
function buddyList(){return `<div style="position:relative;padding-top:48px;display:flex;flex-direction:column;gap:12px">${ann(2,'新增找搭子：用距离、水平、时间做匹配','top:0;left:0')}<div class=card><b>按条件找搭子</b><div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px">${['3km内','今晚可约','新手友好','愿意带新人','爽约0次'].map(x=>pill(x)).join('')}</div></div>${buds.map((b,i)=>`<button onclick="S.b=buds.find(x=>x.id==${b.id});go('buddy')" style="padding:0;text-align:left"><div class=card><div class=row>${av(b.av)}<div style=flex:1><div style="display:flex;justify-content:space-between"><b>${b.name}</b><span class=tag>匹配度 ${92-i*6}%</span></div><div class="muted small">${b.ball} · ${b.level} · ${b.time}</div><div class="muted small">常打：${b.area}</div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">${b.tags.map(x=>pill(x)).join('')}</div><div class=statgrid style="margin-top:10px">${st('参与',b.joined)}${st('爽约',b.cancel)}${st('评分',b.rating)}${st('组局',b.hosted)}</div></div></div></div></button>`).join('')}</div>`}
function venues(){return ['TopSpin 球场|2.3km|¥80/小时','校园西区球场|0.8km|校内免费','Paddle Park|1.7km|¥100/小时'].map(v=>{let a=v.split('|');return `<div class=card><div style="display:flex;justify-content:space-between"><div><b>${a[0]}</b><div class="muted small">${a[1]} · ${a[2]}</div></div><span class=tag>可预约</span></div><div class=grid3>${['19:00','20:00','21:00'].map(x=>`<button class=btnw onclick=go('post') style="background:#fafafa">${x}<br><span class=small style="color:var(--g2)">可订</span></button>`).join('')}</div></div>`}).join('')}
function detail(){let g=S.g;return `${hd('组局详情','时间、球友、费用与安全',1)}<div class=content><div class=card><div style="display:flex;justify-content:space-between"><div><h2 style="margin:0;font-size:24px">${g.title}</h2><div class="muted small" style="margin-top:12px">${g.time}</div><div class="muted small">${g.venue} · ${g.distance}</div></div><span class=tag>${g.badge}</span></div><div class=info>${ib('水平',g.level)}${ib('人数',g.people)}${ib('费用',g.price)}</div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">${g.tags.map(x=>pill(x)).join('')}</div></div><div class=card style="padding-top:50px">${ann(4,'补充费用明细，降低价格不透明顾虑','top:12px;left:12px')}<b>费用明细</b><div class=fee><span>场地费</span><span>${g.fee[0]}</span></div><div class=fee><span>平台服务费</span><span>${g.fee[1]}</span></div><div class=fee><span>装备租借</span><span>${g.fee[2]}</span></div><div class=total><span>合计</span><span>${g.fee[3]}/人</span></div></div><div class=card style="padding-top:50px">${ann(5,'已报名球友可查看主页，增强信任感','top:12px;right:12px')}<b>已报名球友</b>${buds.map(b=>`<button class=row style="margin-top:12px" onclick="S.b=buds.find(x=>x.id==${b.id});go('buddy')">${av(b.av,'sm')}<div style=flex:1><div class="fw small">${b.name} · ${b.ball} · ${b.level}</div><div class="muted small">爽约${b.cancel} · 评分${b.rating}</div></div><span class="muted small">主页 ›</span></button>`).join('')}</div><div class="card amber" style="padding-top:50px">${ann(6,'加入安全提醒与取消规则，降低放鸽子风险','top:12px;left:12px')}<h3>安全与取消规则</h3><p>参与者需完成手机号验证；平台记录临时取消次数；开局前2小时提醒，减少放鸽子。</p></div></div><div class=footer><button class=primary onclick=go('confirm')>立即报名</button></div>`}
function buddy(){let b=S.b;return `<div class=profhero><button class=back onclick=back() style="position:absolute;left:20px;top:12px">‹</button><div style="position:absolute;left:20px;bottom:20px;display:flex;gap:16px;align-items:flex-end">${av(b.av,'lg')}<div><div style="display:flex;gap:8px;align-items:center"><h1 style="margin:0;font-size:24px">${b.name}</h1><span class="pill a">${b.level}</span></div><div class="muted small">${b.ball} · ${b.age}</div><div class="muted small">常打：${b.area}</div></div></div></div><div class=content><div class=actions><button>邀请约球</button><button>私信</button><button>加好友</button></div><div class=card style="padding-top:50px">${ann(7,'主页突出评分、爽约、参与记录等信任信息','top:12px;left:12px')}<div class=statgrid>${st('参与',b.joined)}${st('组局',b.hosted)}${st('爽约',b.cancel)}${st('评分',b.rating)}</div></div><div class=card><b>约球信任信息</b><div class=line><span>常打区域</span><span>${b.area}</span></div><div class=line><span>是否新手友好</span><span>是</span></div><div class=line><span>身份验证</span><span>手机号已验证</span></div><div class=line><span>临时取消</span><span>${b.cancel}，平台已记录</span></div></div><div class=card><b>个人简介</b><p class="muted small" style="line-height:1.7">${b.intro}</p></div></div>`}
function post(){return `${hd('发布组局','让附近球友更容易加入',1)}<div class=content>${[['活动标题','周五晚新手友好局'],['时间','周五 19:30 - 21:00'],['地点','TopSpin 球场 · 2号场'],['人数','还缺 2 人 / 共 8 人'],['水平要求','新手、入门均可参加'],['费用说明','场地费¥20 + 服务费¥3 + 装备¥2']].map(r=>`<div class=card><span class="muted small">${r[0]}</span><div class=fw style="margin-top:6px">${r[1]}</div></div>`).join('')}<div class=card style="padding-top:50px;background:#7ed8001a">${ann(8,'发布组局加入平台建议，提高组局成功率','top:12px;left:12px')}<b>平台建议</b><p class="muted small" style="line-height:1.7">建议开启“新手友好”“费用明细”“开局提醒”，提高报名率和组局成功率。</p></div></div><div class=footer><button onclick=go('discover') class=primary>发布组局</button></div>`}
function stats(){return `${hd('统计','运动数据作为辅助记录')}<div style="padding:0 20px;display:flex;gap:30px;font-weight:950;border-bottom:1px solid #0001"><span style="color:var(--g2);border-bottom:2px solid var(--g);padding-bottom:12px">总览</span><span class=muted>周</span><span class=muted>月</span><span class=muted>年</span></div><div class=content><div class=card style="padding-top:50px">${ann(9,'统计页保留为辅助，不抢约伴主流程','top:12px;right:12px')}<b>本周打球次数</b><div style="font-size:40px;font-weight:950;margin-top:12px">3 <span style="font-size:16px">次</span></div><div class=chart>${[2,1,0,3,1,2,0].map((v,i)=>`<div class=bw><div class=bb><div class=bar style="height:${Math.max(8,v/3*80)}px"></div></div><span>周${i+1}</span></div>`).join('')}</div></div><div class=data>${['卡路里|1,256|kcal','运动时长|6.2|小时','平均心率|128|bpm','步数|32,846|步'].map(s=>{let x=s.split('|');return `<div class=card><div class="muted small">${x[0]}</div><div style="font-size:24px;font-weight:950;margin-top:8px">${x[1]} <span class="muted small">${x[2]}</span></div><div class=spark></div></div>`}).join('')}</div></div>${nav('stats')}`}
function messages(){return `${hd('消息','组局提醒与球友互动')}<div class=content style="position:relative;padding-top:48px">${ann(9,'消息页保留提醒功能，不抢核心流程','top:0;left:20px')} ${['今晚19:00 双打娱乐局即将开始','Mia 想加入你的周五新手局','TopSpin 球场20:00时段预约成功','Ken 给你的个人主页点赞'].map((m,i)=>`<div class=card style="display:flex;gap:12px;align-items:center"><span class="av sm" style="background:${i?'#f4f4f5':'var(--g)'};color:${i?'#111':'#fff'}">${i?'•':'!'}</span><div><b class=small>${m}</b><div class="muted small">${i+1}小时前</div></div></div>`).join('')}</div>${nav('messages')}`}
function profile(){return `<div class=profhero><div style="position:absolute;left:20px;bottom:20px;display:flex;gap:16px;align-items:flex-end">${av('A','lg')}<div><div style="display:flex;gap:8px;align-items:center"><h1 style="margin:0;font-size:24px">Alex Chen</h1><span class="pill a">Lv.18</span></div><div class="muted small">球龄 2.6 年 · 上海</div><div style="display:flex;gap:8px;margin-top:8px">${pill('右手双反')}${pill('爱拼搏')}</div></div></div></div><div class=content><div class=card><div class=statgrid>${st('参与','28场')}${st('组局','9次')}${st('球友','56')}${st('爽约','0次')}</div></div><div class=card><b>手表数据</b><div class=statgrid style="margin-top:12px">${st('时长','6.2h')}${st('卡路里','1,256')}${st('心率','128')}${st('步数','32,846')}</div></div><div class=card><b>最近动态</b><div class=line><span>参加了 欢乐双打局</span><span>赞 5</span></div><div class=line><span>组了局 周末竞技练习局</span><span>赞 6</span></div></div></div>${nav('profile')}`}
function confirm(){return `${hd('报名成功','系统已为你保留本场名额',1)}<div class=content style="text-align:center;justify-content:center;position:relative;padding-top:70px">${ann(6,'报名后继续提醒取消规则和安全事项','top:20px;left:20px')}<div style="width:112px;height:112px;border-radius:50%;background:#7ed80033;color:var(--g2);font-size:54px;font-weight:950;display:flex;align-items:center;justify-content:center;margin:0 auto">✓</div><h2>已加入今晚新手友好局</h2><p class=muted style="line-height:1.8">开局前2小时会提醒你。若临时取消，请提前在活动页操作，避免影响个人信用记录。</p><button class=primary onclick=go('home')>返回首页</button></div>`}
function buddies(){return `${hd('找搭子','按距离、水平、时间推荐球友',1)}<div class=content>${buddyList()}</div>`}
function render(){const pages={home,discover,detail,buddy,post,stats,messages,profile,confirm,buddies};$('#app').innerHTML=(pages[S.page]||home)()}render();
</script></body></html>
